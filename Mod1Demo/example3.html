<html>
	<head>
		<title>Example with an Alert and Timeout</title>
	</head>
	
	<body>
		<center>
			<h1>Alert Demo that appears after 10 seconds</h1>
			
			<script>
				setTimeout(wakeUpUser, 10000);
				
				function wakeUpUser() {
					var message = "This is an Alert after 10 seconds!!";
					alert(message);
				}
			</script>
