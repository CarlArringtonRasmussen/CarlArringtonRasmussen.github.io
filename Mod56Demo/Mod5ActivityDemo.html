<html>

	<head>
		<title>Module 05 Activity Demo</title>
	</head>
	
	<body>
		<h3>Module 05 Activity Demo</h3>
		
		<form>
			First Name: <input type = "text" id="fname"> <br>
			Last Name: &nbsp;<input type = "text" id="lname"> <br>
			Address: &emsp; <input type = "text" id="address"> <br>
			City: &emsp;&emsp;&ensp; <input type = "text" id="city"> <br>
			State: &emsp;&emsp;&ensp;<input type = "text" id="state"> <br>
		</form>
		
		<button onclick = "displayData()">
			Send Data to Console
		</button>
		
		<p id="output"></p>
		
		<script>
			function displayData()
			{
				var firstName = document.getElementById("fname").value;
				var lastName = document.getElementById("lname").value;
				var address = document.getElementById("address").value;
				var city = document.getElementById("city").value;
				var state = document.getElementById("state").value;
				
				console.log("First Name: " + firstName);
				console.log("Last Name: " + lastName);
				console.log("Address: " + address);
				console.log("City: " + city);
				console.log("State: " + state);
				
				document.getElementById("output").innerHTML =
					"<center><h1>Open the console to see the results.</h1></center>";
			}
		
		</script>
	
		<center>
			<p>
				<a href="../index.html">
						Return to the Home Page
				</a>
			</p>
		</center>
	
	</body>

	</footer>

</html>
