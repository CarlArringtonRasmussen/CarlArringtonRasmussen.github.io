<html>
	<head>
		<title>While Loop Demo</title>
	</head>

	<body>

		<h2>JavaScript While Loop Demo</h2>
		
		<p id = "output"></p>
		
		<script>
			var text = "";
			var i = 0;
			while(i < 20)
			{
				text += "This is iteration #" + i + "<br>";
				i++;
			}
			document.getElementById("output").innerHTML = text;
		</script>

			</p>
		</center>
	
	</body>
