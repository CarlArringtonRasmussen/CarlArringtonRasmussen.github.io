<html>
	<head>
		<title>For Loop Demo</title>
	</head>

	<body>

		<h2>JavaScript For Loop Demo</h2>
		
		<p id = "output"></p>
		
		<script>
			var text = "";
			var i;
			for(i=0; i<10; i++)
			{
				text += "This is iteration #" + i + "<br>";
			}
			document.getElementById("output").innerHTML = text;
		</script>

				</a>
			</p>
		</center>
	
	</body>
