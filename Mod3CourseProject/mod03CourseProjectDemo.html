<html>
	<head>
		<title>Module 03 Course Project Demo</title>
	</head>
	
	<body>
		<p>Enter a string here: 
			<input type="text" id="myText" value = "Enter Text">
		</p>
		<p>
			Click "Try it" to display the value of each element in the form.
		</p>
		
		<button onclick="displayEntry()">
			Display Entry
		</button>
		
		<p id="outputArea"></p>
		
		<script>
			function displayEntry() {
				var output = document.getElementById("myText").value;
				document.getElementById("outputArea").innerHTML = output;
			}
		</script>
		
	</body>

</html>
